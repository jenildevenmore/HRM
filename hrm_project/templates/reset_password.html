<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Set Password - HRM System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="{{ static('css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">H</div>
                <div>
                    <h1>HRM System</h1>
                    <p>Set Your Password</p>
                </div>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="badge badge-number" style="display:block;margin-bottom:14px;padding:10px 12px;">{{ success }}</div>
            <a href="{{ url('login') }}" class="btn btn-primary login-btn">Go to Login</a>
            {% else %}
            <form method="post" action="{{ url('reset_password') }}">
                {{ csrf_input }}
                <input type="hidden" name="uid" value="{{ uid }}">
                <input type="hidden" name="token" value="{{ token }}">

                <div class="form-group">
                    <label for="id_password">New Password</label>
                    <input type="password" name="password" id="id_password" placeholder="Enter new password" required>
                </div>

                <div class="form-group">
                    <label for="id_confirm_password">Confirm Password</label>
                    <input type="password" name="confirm_password" id="id_confirm_password" placeholder="Confirm password" required>
                </div>

                <button type="submit" class="btn btn-primary login-btn">Set Password</button>
            </form>
            {% endif %}
        </div>
    </div>
    <script src="{{ static('js/main.js') }}"></script>
</body>
</html>
