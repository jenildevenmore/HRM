<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - HRM System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="{{ static('css/style.css') }}" rel="stylesheet">
</head>
<body>
    <div class="login-page">
        <div class="login-card">
            <div class="login-logo">
                <div class="logo-icon">H</div>
                <div>
                    <h1>HRM System</h1>
                    <p>Forgot Password</p>
                </div>
            </div>

            {% if error %}
            <div class="login-error">{{ error }}</div>
            {% endif %}
            {% if success %}
            <div class="badge badge-number" style="display:block;margin-bottom:14px;padding:10px 12px;">{{ success }}</div>
            {% endif %}

            {% if debug_reset_link %}
            <div style="margin-bottom:12px;">
                <label style="display:block;margin-bottom:6px;">Debug Reset Link</label>
                <input type="text" value="{{ debug_reset_link }}" readonly>
            </div>
            {% endif %}

            <form method="post" action="{{ url('forgot_password') }}">
                {{ csrf_input }}
                <div class="form-group">
                    <label for="id_identifier">Email, Employee ID or Username</label>
                    <input type="text" name="identifier" id="id_identifier" placeholder="Enter your email, employee ID or username" value="{{ identifier or '' }}" required>
                </div>

                <div class="form-group">
                    <label for="id_client_id">Client (Optional)</label>
                    <select name="client_id" id="id_client_id">
                        <option value="">All Clients</option>
                        {% for client in clients %}
                        <option value="{{ client.id }}" {% if selected_client_id == (client.id|string) %}selected{% endif %}>{{ client.name }}</option>
                        {% endfor %}
                    </select>
                    {% if clients_load_failed %}
                    <small style="color:var(--text-muted);">Unable to load clients. You can still submit without selecting a client.</small>
                    {% endif %}
                </div>

                <button type="submit" class="btn btn-primary login-btn">Send Reset Link</button>
            </form>

            <div style="margin-top:12px;text-align:center;">
                <a href="{{ url('login') }}" class="btn btn-secondary btn-sm">Back to Login</a>
            </div>
        </div>
    </div>
    <script src="{{ static('js/main.js') }}"></script>
</body>
</html>
